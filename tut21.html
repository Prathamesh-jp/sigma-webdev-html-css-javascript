<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS spectificity</title>
    <style>
        /* the specificity of this selector is 1 */
        h1 {
            color: aqua;
        }

        /* the specificity of this selector is 10 */
        .yellow {
            color: yellow;
        }

        /* the specificity of this selector is 10 */
        .cred {
            color: red;
        }

        /* the specificity of this selector is 10 */
        .cpurple {
            color: purple;
        }

        /* this is an example of attribute selector */
        /* [data-x=a] {
            background-color: red;
        } */
    </style>
</head>

<body>
    <div>
        <h1 class="yellow cred cpurple" data-x="a">CSS specificity </h1>
    </div>
</body>

</html>
