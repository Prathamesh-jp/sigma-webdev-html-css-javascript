<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shdows and outlines</title>
    <style>
        .box {
            border: 2px solid black;
            padding: 34px;
            box-shadow: 5px 15px 5px #75dc70;
        }

        .text-element {
            text-shadow: 3px 2px 2px #d617be;
            outline: 2px solid green;
            outline-offset: 15px;
        }
    </style>
</head>

<body>
    <div class="box">
        i am a box
    </div>
    <p class="text-element">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Facilis consectetur distinctio ullam?
    </p>
</body>

</html>
