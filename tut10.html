<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>video and audio and media tags</title>
</head>

<body>
    <video src="GOPR3855.MP4" height="255" controls loop>video</video>
    <audio src="biroba 2024.mp3" controls autoplay loop></audio>
    <svg height="100" width="100">
        <circle cx="50" cy="50" r="40" stroke="black" stroke-width="3" file="red" />
    </svg>
    <img src="image.svg" alt="my svg image">
    <div>
        <!-- <iframe src="https://www.codewithharry.com/" width="1000" height="500"></iframe> -->
        <iframe width="560" height="315"
            src="https://www.youtube.com/embed/XZwBNDGuWGU?si=jFonStOrJ8FfSmmU&amp;start=834"
            title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
</body>

</html>
