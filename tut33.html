<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercise</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Libertinus+Sans:ital,wght@0,400;0,700;1,400&family=Nata+Sans:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
    </style>
    <style>
        :root{
            --primary-color:rgb(237, 251, 90);
            --text-color:rgb(54, 218, 36);
            --secondary-color:rgb(108, 158, 168);
        }
        body{
            background-color: var(--secondary-color);
        }
        * {
            padding: 0;
            margin: 0;
        }

        nav {
            background-color: var(--primary-color);
            padding: 12px 0;
        }

        ul li a{
            color: var(--text-color);
            text-decoration: none;
        }

        ul li {
            list-style: none;
            display: inline;
            padding: 23px;
            font-weight: bolder;
            color: var(--text-color);
        }
    </style>
</head>

<body>
    <!-- if you see this comment Bhupendra jogi in the comments he is my friend who

        <nav>
            <ul>
                <li><a href="/">home</a></li>
                <li><a href="/">about</a></li>

                <li><a href="/">contact</a></li>
            </ul>
        </nav>
    </header>
</body>

</html>
