<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exersise</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Libertinus+Sans:ital,wght@0,400;0,700;1,400&display=swap');

        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: gray;
            padding: 200px;
        }

        .card {
            background-color: white;
            width: 200px;
            border-radius: 7px;
            padding: 0 0 8px 0;
        }

        .image {
            padding: 5px;
        }

        .image img {
            border-radius: 7px;
        }

        .content p {
            font-size: 12px;
            color: gray;
        }

        .capsules {
            padding: 0 15px;
        }

        .capsules span {
            border: 1px solid gray;
            padding: 1px 4px;
            border-radius: 34px;
            font-size: 12px;
            background-color: rgb(233, 230, 227);
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }

        .content {
            padding: 5px 13px;

            .libertinus-sans-regular {
                font-family: "Libertinus Sans", sans-serif;
                font-weight: 400;
                font-style: normal;
            }

            .libertinus-sans-bold {
                font-family: "Libertinus Sans", sans-serif;
                font-weight: 700;
                font-style: normal;
            }

            .libertinus-sans-regular-italic {
                font-family: "Libertinus Sans", sans-serif;
                font-weight: 400;
                font-style: italic;
            }

        }

        .button {
            text-align: center;
        }

        .button button {
            padding: 7px 15px;
            border-radius: 9px;
            background-color: rgb(210, 237, 246);
            color: blue;
            font-size: 8px;
            border: none;
            margin-top: 12px;
        }

        .button button:hover {
            background-color: rgb(34, 237, 11);
            color: white;
        }
    </style>
</head>

<body>
    <!-- card.png is a file which contains a card image wrte html and css to desgin this card -->

    <div class="card">
        <div class="image">
            <img width="188px" height="244vh"
                src="https://m.media-amazon.com/images/I/61eB+4c9xQL._AC_UF1000,1000_QL80_.jpg">
        </div>
        <div class="capsules">
            <span>Nature</span>
            <span>Lake</span>
        </div>
        <div class="content">
            <h2>Prathamesh</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptatem nam quos assumenda harum ipsam
                eligendi repellat dolor. Porro adipisci quis, rem maxime earum qui quae.</p>
        </div>
        <div class="button">
            <button><a target="_blank" href="https://www.nature.com/">Read More</a></button>
        </div>
    </div>

</body>

</html>
